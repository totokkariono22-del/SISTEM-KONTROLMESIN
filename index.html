<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengkel Digital - Split View</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        /* LAYOUT DASAR */
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; flex-direction: row; }
        
        /* SIDEBAR PENCARIAN */
        #sidebar { width: 350px; background: #fff; border-right: 2px solid #ddd; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        #search-input { width: 100%; padding: 12px; border: 2px solid #2196f3; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        #results { flex-grow: 1; overflow-y: auto; }
        
        /* VIEWER PDF (KANAN) */
        #viewer-container { flex-grow: 1; background: #525659; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* ITEM HASIL PENCARIAN */
        .result-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; border-radius: 8px; margin-bottom: 5px; background: #f9f9f9; }
        .result-item:hover { background: #e3f2fd; }
        .result-item h4 { margin: 0 0 5px 0; color: #1976d2; }
        .result-item p { margin: 0; font-size: 13px; color: #666; }

        /* RESPONSIVE UNTUK HP (Tampilan Atas-Bawah) */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 40%; border-right: none; border-bottom: 2px solid #ddd; }
            #viewer-container { height: 60%; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="margin-top:0">🛠️ Cari Gejala</h3>
    <input type="text" id="search-input" placeholder="Ketik rem, oli, mesin...">
    <div id="status" style="font-size: 12px; color: gray; margin-bottom: 10px;">Memuat data...</div>
    <div id="results"></div>
</div>

<div id="viewer-container">
    <iframe id="pdf-viewer" src="about:blank"></iframe>
</div>

<script>
    let fuse;
    const viewer = document.getElementById('pdf-viewer');
    const resultsDiv = document.getElementById('results');
    const status = document.getElementById('status');

    // 1. Load Data JSON
    fetch('data_perbaikan.json')
        .then(res => res.json())
        .then(data => {
            fuse = new Fuse(data, { keys: ['konten'], threshold: 0.3 });
            status.innerHTML = "✅ Database Siap (" + data.length + " data)";
            // Tampilkan halaman 1 sebagai default
            updatePDF(1);
        })
        .catch(e => status.innerHTML = "❌ Gagal muat data!");

    // 2. Fungsi Update PDF (Trik khusus HP)
    function updatePDF(halaman) {
        // Ambil URL file PDF asli di GitHub Anda
        const pdfUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1) + 'manual_mobil.pdf';
        
        // Gunakan Google Docs Viewer agar PDF muncul di dalam Iframe HP
        const embedUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true#page=${halaman}`;
        
        viewer.src = embedUrl;
    }

    // 3. Logika Input
    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value;
        if (query.length < 2) { resultsDiv.innerHTML = ''; return; }

        const found = fuse.search(query);
        resultsDiv.innerHTML = '';

        found.slice(0, 10).forEach(res => {
            const item = res.item;
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<h4>Hal ${item.halaman}</h4><p>${item.konten.substring(0, 80)}...</p>`;
            
            // Klik untuk ganti isi PDF di samping tanpa pindah halaman
            div.onclick = () => {
                updatePDF(item.halaman);
            };
            resultsDiv.appendChild(div);
        });
    });
</script>

</body>
</html>
